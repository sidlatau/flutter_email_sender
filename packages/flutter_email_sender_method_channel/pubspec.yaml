name: flutter_email_sender_method_channel
description: Method channel platform implementation of flutter_email_sender.
version: 1.0.0
homepage: https://github.com/sidlatau/flutter_email_sender
repository: https://github.com/sidlatau/flutter_email_sender/tree/master/packages/flutter_email_sender_method_channel
issue_tracker: https://github.com/sidlatau/flutter_email_sender/issues

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_email_sender_platform_interface: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: flutter_email_sender
    platforms:
      android:
        package: com.sidlatau.flutteremailsender
        pluginClass: FlutterEmailSenderPlugin
        dartPluginClass: MethodChannelFlutterEmailSender
        dartFileName: src/method_channel_flutter_email_sender.dart
      ios:
        pluginClass: FlutterEmailSenderPlugin
        dartPluginClass: MethodChannelFlutterEmailSender
        dartFileName: src/method_channel_flutter_email_sender.dart
      macos:
        pluginClass: FlutterEmailSenderPlugin
        dartPluginClass: MethodChannelFlutterEmailSender
        dartFileName: src/method_channel_flutter_email_sender.dart

topics:
  - email
  - federation
  - plugin
  - method-channel
