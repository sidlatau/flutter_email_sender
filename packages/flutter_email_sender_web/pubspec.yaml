name: flutter_email_sender_web
description: Web platform implementation of flutter_email_sender.
version: 1.0.0
homepage: https://github.com/sidlatau/flutter_email_sender
issue_tracker: https://github.com/sidlatau/flutter_email_sender/issues

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_email_sender_platform_interface: ^1.0.0
  url_launcher: ^6.3.2

flutter:
  plugin:
    implements: flutter_email_sender
    platforms:
      web:
        pluginClass: FlutterEmailSenderWeb
        fileName: flutter_email_sender_web.dart
